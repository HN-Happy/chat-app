<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: sans-serif; }
    li { margin-bottom: 8px; }
    .time { color: gray; font-size: 10px; margin-left: 8px; }
  </style>
</head>
<body>

<h3>チャット</h3>

<!-- 🔥 ログイン中だけ表示 -->
<button id="logoutBtn" onclick="logout()" style="display:none;">
  ログアウト
</button>

<div id="login">
  名前：<input id="name"><br>
  パスワード：<input id="pass" type="password"><br>
  <button onclick="start()">入室</button>
</div>

<div id="chat" style="display:none;">
  <ul id="list"></ul>

  <input id="msg" placeholder="メッセージ">
  <button onclick="send()">送信</button><br>
  <button onclick="loadMessages()">更新</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const SUPABASE_URL = "https://ourisalosxnsseitdbpi.supabase.co";
const SUPABASE_KEY = "sb_publishable_VkLEnyBokYcxNVZhV7yGOg_wAzfphrq";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let name = "";

// 🔥 自動ログイン
window.onload = () => {
  const savedName = localStorage.getItem("chat_name");
  if(savedName){
    name = savedName;
    showChat();
    loadMessages();
  }
};

async function start(){
  const pass = document.getElementById("pass").value;
  name = document.getElementById("name").value;

  if(pass !== "0830"){
    alert("パスワードが違います");
    return;
  }

  localStorage.setItem("chat_name", name);

  showChat();
  loadMessages();
}

// 🔥 ログイン状態にする
function showChat(){
  document.getElementById("login").style.display = "none";
  document.getElementById("chat").style.display = "block";
  document.getElementById("logoutBtn").style.display = "inline";
}

// 🔥 ログアウト
function logout(){
  localStorage.removeItem("chat_name");

  document.getElementById("chat").style.display = "none";
  document.getElementById("login").style.display = "block";
  document.getElementById("logoutBtn").style.display = "none";
}

async function loadMessages(){
  const now = Date.now();
  const dayAgo = now - (24 * 60 * 60 * 1000);

  await client.from("messages").delete().lt("time", dayAgo);

  const { data } = await client
    .from("messages")
    .select("*")
    .order("time", { ascending: true });

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(d => {
    const li = document.createElement("li");

    const date = new Date(d.time);
    const timeStr =
      date.getHours().toString().padStart(2,"0") + ":" +
      date.getMinutes().toString().padStart(2,"0");

    li.innerHTML = d.name + "： " + d.text +
      '<span class="time">' + timeStr + '</span>';

    list.appendChild(li);
  });
}

async function send(){
  const text = document.getElementById("msg").value;

  await client.from("messages").insert([
    {
      name: name,
      text: text,
      time: Date.now()
    }
  ]);

  document.getElementById("msg").value = "";

  loadMessages();
}
</script>

</body>
</html>
